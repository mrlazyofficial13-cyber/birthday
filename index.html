<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Akansha</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
color:#333;
}

.container{
padding:40px;
}

h1{
font-size:40px;
}

.gallery img{
width:120px;
margin:10px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
padding:12px 20px;
background:#ff6b81;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

#surprise{
display:none;
margin-top:30px;
}

video{
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday Akansha 🎂</h1>

<p>
Aaj ka din special hai, wajah tum ho,<br>
Smile thodi zyada aaj isliye ho 🙂
</p>

<h3>Some moments ✨</h3>

<div class="gallery">

<img src="PHOTO1_LINK">
<img src="PHOTO2_LINK">
<img src="PHOTO3_LINK">

</div>

<button onclick="showSurprise()">Click for Surprise 🎁</button>

<div id="surprise">

<h3>Made something for you 🎬</h3>

<video width="300" controls>
<source src="VIDEO_LINK">
</video>

</div>

</div>

<audio autoplay loop>
<source src="SONG_LINK">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function showSurprise(){

document.getElementById("surprise").style.display="block";

confetti({
particleCount:150,
spread:90
});

}

</script>

</body>
</html>
