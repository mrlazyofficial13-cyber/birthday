<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>BirthdayProgram.exe</title>

<style>

body{
background:#0f172a;
color:#22c55e;
font-family:monospace;
text-align:center;
margin:0;
padding:40px;
}

.terminal{
background:#020617;
padding:25px;
border-radius:12px;
max-width:420px;
margin:auto;
box-shadow:0 0 20px #22c55e44;
}

h2{
color:#38bdf8;
}

.gallery{
margin-top:20px;
}

.gallery img{
width:120px;
margin:8px;
border-radius:10px;
}

button{
margin-top:20px;
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

#videoBox{
display:none;
margin-top:20px;
}

</style>

</head>

<body>

<div class="terminal">

<h2>BirthdayProgram.exe</h2>

<p id="typing"></p>

<div class="gallery">

<img src="PHOTO1_LINK">
<img src="PHOTO2_LINK">
<img src="PHOTO3_LINK">

</div>

<button onclick="runSurprise()">Run Surprise()</button>

<div id="videoBox">

<h3>Executing Surprise...</h3>

<video width="320" controls>
<source src="VIDEO_LINK" type="video/mp4">
</video>

</div>

</div>

<audio autoplay loop>
<source src="SONG_LINK">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let message = `
> Initializing birthday protocol...
> Loading happiness modules...
> Detecting user...

User Found: Akansha
Role: CS Student

Compiling wishes...

Output:
Happy Birthday 🎂
Have an amazing year ahead 🙂
`;

let i = 0;

function typing(){

if(i < message.length){

document.getElementById("typing").innerHTML += message.charAt(i);

i++;

setTimeout(typing,40);

}

}

typing();

function runSurprise(){

document.getElementById("videoBox").style.display="block";

confetti({
particleCount:150,
spread:90,
origin:{y:0.6}
});

}

</script>

</body>
</html>
