<!DOCTYPE html>
<html>
<head>
<title>Birthday Program</title>

<style>

body{
background:#0f172a;
color:#00ff9c;
font-family:monospace;
text-align:center;
padding:40px;
}

.terminal{
background:#020617;
padding:20px;
border-radius:10px;
width:350px;
margin:auto;
box-shadow:0 0 20px #00ff9c33;
}

.gallery img{
width:120px;
margin:8px;
border-radius:10px;
}

button{
margin-top:20px;
padding:10px 20px;
background:#00ff9c;
border:none;
border-radius:6px;
cursor:pointer;
}

#video{
display:none;
margin-top:20px;
}

</style>

</head>

<body>

<div class="terminal">

<h2>BirthdayProgram.exe</h2>

<p id="text"></p>

<button onclick="showVideo()">Run Surprise()</button>

<div class="gallery">

<img src="PHOTO1">
<img src="PHOTO2">

</div>

<div id="video">

<video width="300" controls>
<source src="VIDEO_LINK">
</video>

</div>

</div>

<script>

let message = `
Initializing birthday protocol...
Loading happiness modules...
Target: Akansha
Status: Very Special Person

print("Happy Birthday 🎂")
`;

let i=0;

function typing(){
if(i<message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;
setTimeout(typing,40);
}
}

typing();

function showVideo(){
document.getElementById("video").style.display="block";
}

</script>

</body>
</html>
